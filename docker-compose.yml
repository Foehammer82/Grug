services:
  # ------------------------------------------------------------------ #
  # Postgres with pgvector                                               #
  # DB credentials and DATABASE_URL are set directly in this file.      #
  # ------------------------------------------------------------------ #
  postgres:
    build: ./postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: grug
      POSTGRES_USER: grug
      POSTGRES_PASSWORD: grug
    volumes:
      - grug_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grug -d grug"]
      interval: 10s
      timeout: 5s
      retries: 5

  grug:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - grug_db:/app/data
      - grug_files:/app/file_data
    environment:
      - DATABASE_URL=postgresql+asyncpg://grug:grug@postgres:5432/grug
      - FILE_DATA_DIR=/app/file_data
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - grug_db:/app/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://grug:grug@postgres:5432/grug
    ports:
      - "8000:8000"
    depends_on:
      - grug
      - postgres

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - api

volumes:
  grug_db:
  grug_files:
  grug_postgres_data:
