services:
  # ------------------------------------------------------------------ #
  # Postgres with pgvector                                               #
  # DB credentials and DATABASE_URL are set directly in this file.      #
  # ------------------------------------------------------------------ #
  postgres:
    build: ./postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: grug
      POSTGRES_USER: grug
      POSTGRES_PASSWORD: grug
    volumes:
      - grug_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grug -d grug"]
      interval: 10s
      timeout: 5s
      retries: 5

  grug:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - grug_db:/app/data
      - grug_files:/app/file_data
      # Live-reload: mount your working tree so code changes take effect on restart.
      - ./grug:/app/grug
      - ./main.py:/app/main.py
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    environment:
      - DATABASE_URL=postgresql+asyncpg://grug:grug@postgres:5432/grug
      - FILE_DATA_DIR=/app/file_data
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - grug_db:/app/data
      # Live-reload: mount source directories so uvicorn --reload picks up changes.
      - ./grug:/app/grug
      - ./api:/app/api
      - ./alembic:/app/alembic
      - ./roadmap.md:/app/roadmap.md
    environment:
      - DATABASE_URL=postgresql+asyncpg://grug:grug@postgres:5432/grug
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - WEB_CORS_ORIGINS=${WEB_CORS_ORIGINS:-http://localhost:5173}
    # uvicorn with --reload watches /app/grug and /app/api for .py changes.
    command: >
      uv run uvicorn api.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/grug
        --reload-dir /app/api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    depends_on:
      - grug
      - postgres

  # ------------------------------------------------------------------ #
  # Redis / Valkey — optional cache backend                             #
  # Activate with:  docker compose --profile redis up                  #
  # Set REDIS_URL=redis://redis:6379/0 in .env to enable.             #
  # ------------------------------------------------------------------ #
  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - grug_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------ #
  # Web — Vite dev server (hot-module replacement)                       #
  # Activate with:  docker compose --profile dev up                     #
  # The browser uses localhost:8000 for API calls (not the Docker host). #
  # ------------------------------------------------------------------ #
  web-dev:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./web:/app
      # Keep node_modules in a named volume so npm install isn't re-run every start.
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    depends_on:
      - api

volumes:
  grug_db:
  grug_files:
  grug_postgres_data:
  grug_redis_data:
  web_node_modules:
