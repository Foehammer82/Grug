services:
  # ------------------------------------------------------------------ #
  # Postgres with pgvector — optional, used when DATABASE_URL points    #
  # at this service (see .env.example for the two deployment profiles). #
  # ------------------------------------------------------------------ #
  postgres:
    build: ./postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grug}
      POSTGRES_USER: ${POSTGRES_USER:-grug}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grug}
    volumes:
      - grug_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grug} -d ${POSTGRES_DB:-grug}"]
      interval: 10s
      timeout: 5s
      retries: 5

  grug:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - grug_db:/app/data
      - grug_chroma:/app/chroma_data
      - grug_files:/app/file_data
    environment:
      # DATABASE_URL is read from .env — no default here so the .env value wins.
      # Set CHROMA_PERSIST_DIR only when using the SQLite/Chroma profile.
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - FILE_DATA_DIR=/app/file_data
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  api:
    build: ./api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - grug_db:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - grug
      - postgres

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  docs:
    build:
      context: .
      dockerfile: docs/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"

volumes:
  grug_db:
  grug_chroma:
  grug_files:
  grug_postgres_data:
