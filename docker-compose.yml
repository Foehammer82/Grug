services:
  grug:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - grug_db:/app/data
      - grug_chroma:/app/chroma_data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/grug.db
      - CHROMA_PERSIST_DIR=/app/chroma_data

volumes:
  grug_db:
  grug_chroma:
