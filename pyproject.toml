[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "grug"
version = "0.1.0"
description = "Self-hosted AI agent for TTRPG Discord communities"
requires-python = ">=3.12"
dependencies = [
    "discord.py>=2.3.0",
    "openai>=1.0.0",
    "chromadb>=1.0.0",
    "APScheduler>=3.10.0",
    "SQLAlchemy>=2.0.0",
    "aiosqlite>=0.19.0",
    "mcp>=1.0.0",
    "python-dotenv>=1.0.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "aiofiles>=23.0.0",
    "httpx>=0.24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
grug = "main:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.setuptools.packages.find]
where = ["."]
include = ["grug*"]
