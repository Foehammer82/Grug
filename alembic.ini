# alembic.ini — Alembic configuration for Grug's Postgres migrations.
# The sqlalchemy.url is left blank here; grug/db/session.py or alembic/env.py
# injects it at runtime from the DATABASE_URL environment variable.

[alembic]
script_location = alembic
prepend_sys_path = .

# Prevent fileConfig() from killing existing loggers when run programmatically.
disable_existing_loggers = false

# Leave blank — env.py sets this from settings.database_url at runtime.
sqlalchemy.url =

file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %Y-%m-%d %H:%M:%S
