repos:
  # Standard hooks for general hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  # Ruff for linting + formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # pyupgrade to keep syntax modern and clean
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade

  # uv-lock to keep the pyproject.toml and uv.lock in sync
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.7
    hooks:
      - id: uv-lock

  # Auto-generate an Alembic migration when ORM model files change.
  # Requires Postgres to be reachable (DATABASE_URL in .env).
  # Pauses the commit after generation so you can review the file.
  - repo: local
    hooks:
      - id: alembic-autogenerate
        name: alembic autogenerate migration
        entry: uv run python scripts/alembic_autogenerate.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
