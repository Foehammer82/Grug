# Development override for docker-compose.yml
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# What this changes vs. production:
#   grug  — source tree is mounted; restart the container to pick up Python changes.
#   api   — source tree is mounted; uvicorn runs with --reload for live reloads.
#   web   — replaces the nginx image with the Vite dev server (hot-module replacement).
#   docs  — replaces the nginx+MkDocs build with `mkdocs serve` for live preview.

services:
  grug:
    volumes:
      # Overlay the copied source with your local working tree.
      # Data / vector-store volumes are inherited from docker-compose.yml.
      - ./grug:/app/grug
      - ./main.py:/app/main.py

  api:
    volumes:
      - ./grug:/app/grug
      - ./api:/app/api
    # --reload watches /app for any .py change and restarts the worker automatically.
    command: >
      uv run uvicorn api.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/grug
        --reload-dir /app/api

  web:
    # Swap the production nginx image for a live Vite dev server.
    build: !reset null
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./web:/app
      # Keep node_modules in a named volume so `npm install` isn't re-run on
      # every container start and the bind-mount doesn't shadow it.
      - web_node_modules:/app/node_modules
    # --host exposes the dev server on all interfaces so the host can reach it.
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      # Tell Vite to proxy /api requests to the local API container.
      - VITE_API_URL=http://api:8000

  docs:
    # Swap the static nginx build for a live mkdocs-material dev server.
    build: !reset null
    image: squidfunk/mkdocs-material:9
    working_dir: /docs
    volumes:
      - ./docs:/docs/docs
      - ./mkdocs.yml:/docs/mkdocs.yml
    command: serve --dev-addr 0.0.0.0:8080
    ports:
      - "8080:8080"

volumes:
  web_node_modules:
