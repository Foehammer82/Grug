# Development override for docker-compose.yml
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --force-recreate --build
#
# What this changes vs. production:
#   grug  — source tree is mounted; restart the container to pick up Python changes.
#   api   — source tree is mounted; uvicorn runs with --reload for live reloads.
#   web   — replaces the nginx image with the Vite dev server (hot-module replacement).

services:
  grug:
    volumes:
      # Overlay the copied source with your local working tree.
      # Data / vector-store volumes are inherited from docker-compose.yml.
      - ./grug:/app/grug
      - ./main.py:/app/main.py
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini

  api:
    volumes:
      - ./grug:/app/grug
      - ./api:/app/api
    # --reload watches /app for any .py change and restarts the worker automatically.
    command: >
      uv run uvicorn api.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/grug
        --reload-dir /app/api
    environment:
      # In dev the browser and the OAuth redirect both hit localhost:8000,
      # and the Vite dev server is on 5173 — override the production defaults.
      - FRONTEND_URL=http://localhost:5173
      - WEB_CORS_ORIGINS=http://localhost:5173

  web:
    # Swap the production nginx image for a live Vite dev server.
    build: !reset null
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./web:/app
      # Keep node_modules in a named volume so `npm install` isn't re-run on
      # every container start and the bind-mount doesn't shadow it.
      - web_node_modules:/app/node_modules
    # --host exposes the dev server on all interfaces so the host can reach it.
    command: sh -c "npm install && npm run dev -- --host"
    # Override the production port (3000:80 / nginx) and expose only the Vite
    # dev server port so the two mappings don't conflict.
    ports: !override
      - "5173:5173"
    environment:
      # The browser reaches the API directly on localhost:8000 — the Docker
      # internal hostname (api:8000) is not reachable from the browser.
      - VITE_API_URL=http://localhost:8000

volumes:
  web_node_modules:
