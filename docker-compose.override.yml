# Development overrides — automatically merged by `docker compose up`.
#
# Replaces the production nginx web service with the Vite dev server so
# file changes trigger instant HMR without a full rebuild.
#
# Access the UI at http://localhost:5173 instead of http://localhost:3000.
#
# To use the production nginx build instead, run:
#   docker compose -f docker-compose.yml up
services:
  web:
    build:
      context: ./web
      target: dev          # Use the dev stage, not the nginx production stage.
    volumes:
      - ./web:/app         # Bind-mount source so edits are visible immediately.
      - /app/node_modules  # Anonymous volume keeps container node_modules intact.
    ports:
      - "5173:5173"        # Vite dev server port (overrides the nginx 3000 mapping).
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    # No healthcheck needed for the dev server.
    healthcheck:
      disable: true
